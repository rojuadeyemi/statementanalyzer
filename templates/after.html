<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<title>Statement Analyzer</title>

<link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='img/diabetes test.png') }}">
<link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='css/summary.css') }}">

</head>

<body class="after">

<div class="icon-container text-center my-3">
    <img src="{{ url_for('static', filename='img/diabetes test.png') }}" width="70">
</div>

<!-- Home Button -->
<div class="text-center mt-3">
    <a href="/" class="btn btn-primary px-5">
        <i class="fas fa-home"></i> Home Page
    </a>
</div>

<!-- MAIN CONTAINER -->
<div class="container mt-4">

    <!-- Header -->
    <div class="card shadow-sm mb-3">
        <div class="card-header bg-primary text-white text-center">
            <h5 class="mb-0">
                <i class="fas fa-file-alt"></i> Statement Summary
            </h5>
        </div>

        <div class="card-body">
            <div class="summary-grid">
                {% for key, value in statement_summary.items() %}
                <div class="summary-item">
                    <b>{{ key }}</b>
                    <span>{{ value }}</span>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>

</div>

<!-- FIXED DOWNLOAD BUTTON -->
<div class="download-fab">
    <a href="{{ url_for('download', job_id=job_id) }}" class="btn btn-success btn-lg shadow">
        <i class="fas fa-download"></i> Download Report
    </a>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

</body>
</html>
